name: Playwright Bug Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-bug:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run bug tests
        run: npx playwright test --project=bug-chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-bug
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-bug
          path: test-results/
          retention-days: 7

      - name: Notify Slack
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="✅ 成功"
          else
            STATUS="❌ 失敗"
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -X POST -H "Content-type: application/json" \
          --data "{
            \"text\": \"${STATUS}\n【GitHub Actions】Playwright Bug Tests\nリポジトリ: ${{ github.repository }}\nブランチ: ${{ github.ref_name }}\n実行者: ${{ github.actor }}\nイベント: ${{ github.event_name }}\n詳細: ${RUN_URL}\"
          }" \
          "${{ secrets.SLACK_WEBHOOK_URL }}"